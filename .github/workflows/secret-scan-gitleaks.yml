---
name: Secret Scan (Gitleaks)

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install checksum-bound Gitleaks CLI
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/gitleaks.tar.gz"
          curl --fail --location --silent --show-error             "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"             --output "${archive}"
          printf '%s  %s\n' "${GITLEAKS_SHA256}" "${archive}" | sha256sum --check -
          tar -xzf "${archive}" -C "${RUNNER_TEMP}" gitleaks
          "${RUNNER_TEMP}/gitleaks" version

      - name: Scan pull request commit range
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          "${RUNNER_TEMP}/gitleaks" git --no-banner --redact=100             --log-opts="${BASE_SHA}..${HEAD_SHA}" .

      - name: Scan pushed commit range
        if: github.event_name == 'push'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ "${BEFORE_SHA}" =~ ^0+$ ]]; then
            log_opts="${HEAD_SHA}"
          else
            log_opts="${BEFORE_SHA}..${HEAD_SHA}"
          fi
          "${RUNNER_TEMP}/gitleaks" git --no-banner --redact=100             --log-opts="${log_opts}" .
